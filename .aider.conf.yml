# specwright Integration for Aider
#
# Workflow:
#   1. Read the contract: specwright contract specs/<task>.spec
#   2. Implement against the contract
#   3. Verify: specwright lifecycle specs/<task>.spec --code . --format json
#   4. Guard: specwright guard --spec-dir specs --code .
#   5. Review: specwright explain specs/<task>.spec --format markdown
#
# Key Commands:
#   specwright contract <spec>   - render Task Contract for planning
#   specwright lifecycle <spec>  - full lint + verify pipeline
#   specwright guard             - repo-wide pre-commit check
#   specwright explain <spec>    - human-readable review summary
#   specwright stamp <spec>      - preview git trailers (--dry-run)
#
# Retry Protocol:
#   When lifecycle fails, parse JSON output and fix code based on evidence.
#   Do NOT modify the spec file to make verification pass.
#   After 3 consecutive failures on the same scenario, escalate.
#
# Verdicts: pass, fail, skip, uncertain (skip != pass)
